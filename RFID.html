ef="#rfid-tag-guide-for-qidi-box" class="toc-anchor">¶</a> RFID-Tag-Guide for QIDI BOX</h1>
<h2 class="toc-header" id="radio-frequency-rf-interface-of-the-fm11rf08s-chip"><a href="#radio-frequency-rf-interface-of-the-fm11rf08s-chip" class="toc-anchor">¶</a> Radio Frequency (RF) Interface of the FM11RF08S Chip</h2>
<ul>
<li>Communication Protocol: Complies with ISO/IEC 14443-A</li>
<li>Operating Frequency Range: 13.56 MHz</li>
<li>Communication Baud Rate: 106 Kbit/s</li>
<li>Operating Distance: Not less than 100 mm (dependent on antenna size)</li>
<li>Encryption Algorithm: Compliant with M1 standard</li>
</ul>
<h2 class="toc-header" id="eeprom-memory-of-the-fm11rf08s-chip"><a href="#eeprom-memory-of-the-fm11rf08s-chip" class="toc-anchor">¶</a> EEPROM Memory of the FM11RF08S Chip</h2>
<p>The EEPROM is divided into 16 sectors, each consisting of 4 data blocks, with each block containing 16 bytes.<br>
<img width="800" alt="rfid-1-en.png" src="/rfid-1-en.png"></p>
<div class="table-container"><table>
<thead>
<tr>
<th>Block Type</th>
<th>Stored Content</th>
<th>Read/Write Permissions</th>
</tr>
</thead>
<tbody>
<tr>
<td>Manufacturer Block</td>
<td>Stores manufacturer code</td>
<td>Read-only</td>
</tr>
<tr>
<td>Control Block</td>
<td>Password A, Access Control, Password B</td>
<td>Readable and writable</td>
</tr>
<tr>
<td>Data Block</td>
<td>Stores user data</td>
<td>Readable and writable</td>
</tr>
</tbody>
</table></div>
